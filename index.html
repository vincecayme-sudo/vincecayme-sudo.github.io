<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width, initial-scale=1.0"> 
    <title>Website Portfolio</title>
    <style>
    #loader-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background-color: #ffffff; /* Cover the content below */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999; /* Keeps it on top of everything */
    transition: opacity 0.5s ease;
}

    /* A simple CSS spinning wheel */
    .spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #f3f3f3;
    border-top: 5px solid #3498db;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
    </style>
</head>
<body> 

    <div id="loader-wrapper"> 
        <div class="spinner"></div>
        <p><Loading class=""></Loading></p>
    </div>
    

    
    <header> 
        <h1>Vince Cayme - Full stack engineer</h1>
        <nav> 
            <ul>About</ul>
            <ul>Projects</ul>
            <ul>Github</ul>
        </nav>
    </header>

    <main> 
        <article>
            <h2>Project 1: C++ Chess Engine</h2>
        </article>
    </main>
    <!-- Run JavaScript for loading screen-->
    <script> 
        window.addEventListener('load', () => {
    const loader = document.getElementById('loader-wrapper');
    
    // Smoothly fade out the loader
    loader.style.opacity = '0';
    
    // Remove it from the DOM after the fade animation finishes
    setTimeout(() => {
        loader.style.display = 'none';
    }, 500);
    });
    </script>

    <aside> 
        <p>Sidebar content</p>
    </aside>

    <footer>
        <p>2026 Vince Cayme</p>
    </footer>
</body>
</html>
